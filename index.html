<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David ShopNova</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6fb;
        }

        .hero {
            background: #0d6efd;
            color: white;
            text-align: center;
            padding: 80px 20px;
        }

        .card {
            transition: 0.3s;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card:hover {
            transform: scale(1.05);
        }

        footer {
            background: #0d1b2a;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">ShopNova</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>Bienvenido a David ShopNova</h1>
    <p>Compra y vende productos de forma moderna</p>
</section>

<!-- SERVICIOS -->
<section class="container my-5">
    <h2 class="text-center">Servicios</h2>
</section>

<!-- CONTACTO -->
<section class="container my-5">
    <h2 class="text-center mb-4">Contacto</h2>

    <div class="row">

        <div class="col-md-5">
            <p><strong>Correo:</strong> david198900@gmail.com</p>
            <p><strong>Teléfono:</strong> 0999017665</p>
        </div>

        <div class="col-md-7">

            <form id="formulario">

                <input id="nombre" class="form-control my-2" placeholder="Nombre">
                <div class="invalid-feedback">Mínimo 3 caracteres</div>

                <input id="correo" class="form-control my-2" placeholder="Correo">
                <div class="invalid-feedback">Correo inválido</div>

                <input id="asunto" class="form-control my-2" placeholder="Asunto">
                <div class="invalid-feedback">Obligatorio</div>

                <textarea id="mensaje" class="form-control my-2" placeholder="Mensaje"></textarea>
                <div class="invalid-feedback">Mínimo 10 caracteres</div>

                <button class="btn btn-primary w-100">Enviar</button>

            </form>

        </div>

    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>Estudiante: Cristian David Chiquimba Mena</p>
